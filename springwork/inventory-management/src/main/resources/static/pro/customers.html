<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/customers.js"></script>
    <script src="/js/auth.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
        }
        /* Header Styles */
        .dashboard-header {
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0;
        }
        .dashboard-header .navbar { padding: 1rem 0; }
        .dashboard-header .brand, .dashboard-header .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #000 !important;
        }
        .dashboard-header .navbar-nav .nav-link { color: #666 !important; font-weight: 500; margin: 0 1rem; transition: color 0.3s; }
        .dashboard-header .navbar-nav .nav-link:hover { color: #000 !important; }
	
        .dashboard-header .user-info { display: flex; align-items: center; gap: 1.2rem; }
        .dashboard-header .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e0e7ff; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; color: #4f46e5; }
        .container {
            max-width: 1400px;
            margin: 30px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn-secondary {
            background: #cbd5e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #a0aec0;
        }

        .filters-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-button {
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .table-responsive {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons button {
            padding: 6px 12px;
            font-size: 12px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            grid-column: 1 / -1;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.2);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .details-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .details-item {
            padding: 15px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .details-item strong {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }

        .details-item-value {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        .details-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-section h1 {
            margin: 0;
            color: #333;
            font-size: 28px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .filters-section {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            td, th {
                padding: 8px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <nav class="navbar navbar-expand-lg navbar-light">
            <div class="container-fluid px-4">
                <a class="navbar-brand" href="/pro/customers.html">
                    <i class="bi bi-people"></i> Customer Management
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarMenu">
                    <ul class="navbar-nav ms-auto" id="headerMenu"></ul>
                    <div class="user-info ms-3">
                        <span id="userName" class="fw-bold"></span>
                        <span id="userRole" class="text-muted small"></span>
                        <span id="userAvatar" class="user-avatar">U</span>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <div class="container">
        <div class="header-section">
            <h1><i class="bi bi-people"></i> Customers</h1>
            <button class="btn-success" onclick="createNewCustomer()"><i class="bi bi-plus-circle"></i> Add Customer</button>
        </div>

        <div id="alert" class="alert"></div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('filters-tab', event)">Search</button>
            <button class="tab-button" onclick="switchTab('results-tab', event)">Results</button>
            <button class="tab-button" onclick="switchTab('details-tab', event)">Details / Create</button>
        </div>

        <!-- Tab 1: Search/Filter -->
        <div id="filters-tab" class="tab-content active">
            <div class="filters-section">
                <div class="filter-group">
                    <label>Company: <span style="color:red">*</span></label>
                    <select id="companyFilter" required>
                        <option value="">Select a company</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Customer Name:</label>
                    <input type="text" id="nameFilter" placeholder="Search by name...">
                </div>
                <div class="filter-actions">
                    <button class="btn-primary" onclick="performSearch()">🔍 Search</button>
                    <button class="btn-secondary" onclick="resetFilters()">↻ Reset</button>
                </div>
            </div>
        </div>

        <!-- Tab 2: Search Results -->
        <div id="results-tab" class="tab-content">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>City</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                        <tr>
                            <td colspan="5" class="empty-state">Use Search to find customers</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tab 3: Details / Create -->
        <div id="details-tab" class="tab-content">
            <div id="detailsAlert" class="alert"></div>

            <!-- Customer Details View -->
            <div id="customerDetailsContainer" style="display:none;">
                <div class="details-section">
                    <h2 style="margin-bottom: 20px; color: #333;" id="customerDetailsTitle">Customer Details</h2>
                    <div id="customerDetails"></div>
                    
                    <div class="details-actions">
                        <button type="button" class="btn-secondary" onclick="closeDetailsView()">Close</button>
                        <button type="button" class="btn-primary" id="editBtn" onclick="editCustomer()">Edit</button>
                        <button type="button" class="btn-danger" id="deleteBtn" onclick="deleteCustomer()">Delete</button>
                    </div>
                </div>
            </div>

            <!-- Create/Edit Customer Form -->
            <div id="customerFormContainer">
                <div class="form-section">
                    <h2 style="margin-bottom: 20px; color: #333;" id="formTitle">New Customer</h2>

                    <form id="customerForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Company*</label>
                                <select id="customerCompany" required>
                                    <option value="">Select a company</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Customer Name*</label>
                                <input type="text" id="customerName" required>
                            </div>

                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="customerEmail">
                            </div>

                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" id="customerPhone">
                            </div>

                            <div class="form-group">
                                <label>Address</label>
                                <input type="text" id="customerAddress">
                            </div>

                            <div class="form-group">
                                <label>City</label>
                                <input type="text" id="customerCity">
                            </div>

                            <div class="form-group">
                                <label>State/Province</label>
                                <input type="text" id="customerState">
                            </div>

                            <div class="form-group">
                                <label>Zip Code</label>
                                <input type="text" id="customerZipCode">
                            </div>

                            <div class="form-group">
                                <label>Country</label>
                                <input type="text" id="customerCountry">
                            </div>

                            <div class="form-group">
                                <label>Notes</label>
                                <textarea id="customerNotes"></textarea>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-secondary" onclick="closeDetailsView()">Cancel</button>
                            <button type="submit" class="btn-primary">Save Customer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
